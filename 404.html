<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Spark BD - Redirecting...</title>
  <script>
    // Single Page App redirect for GitHub Pages
    // This script takes the current URL and converts the path to a query string
    // so that the main index.html can handle client-side routing
      (function() {
        var location = window.location;
        var path = location.pathname;
        var hash = location.hash;
        // If already on the SPA fallback (/?/...), do NOT redirect again
        if (path.startsWith('/?/')) {
          // Already in fallback format, do nothing
          return;
        }
        // Otherwise, redirect to root with path as SPA fallback
        var cleanPath = path.startsWith('/') ? path.slice(1) : path;
        var redirectUrl = location.protocol + '//' + location.host + '/?/' + cleanPath;
        if (hash) {
          redirectUrl += hash;
        }
        location.replace(redirectUrl);
      })();
  </script>
</head>
<body>
  <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: system-ui, -apple-system, sans-serif;">
    <div style="text-align: center;">
      <h1 style="color: #3b82f6;">Auto Spark BD</h1>
      <p>Redirecting...</p>
    </div>
  </div>
</body>
</html>
