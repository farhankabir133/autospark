<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Spark BD - Redirecting...</title>
  <script>
    // Single Page App redirect for GitHub Pages
    // This script takes the current URL and converts the path to a query string
    // so that the main index.html can handle client-side routing
    (function() {
      var pathSegmentsToKeep = 1; // Keep '/autospark' as the base
      var location = window.location;
      var repo = '/autospark';
      
      // Get the path after the repo name
      var path = location.pathname.split('/').slice(pathSegmentsToKeep + 1).join('/');
      var search = location.search;
      var hash = location.hash;
      
      // Build the redirect URL
      var redirectUrl = location.protocol + '//' + location.host + repo + '/?/' + path;
      
      if (search) {
        redirectUrl += '&' + search.slice(1);
      }
      
      if (hash) {
        redirectUrl += hash;
      }
      
      // Redirect to the main page with the path as a query parameter
      location.replace(redirectUrl);
    })();
  </script>
</head>
<body>
  <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: system-ui, -apple-system, sans-serif;">
    <div style="text-align: center;">
      <h1 style="color: #3b82f6;">Auto Spark BD</h1>
      <p>Redirecting...</p>
    </div>
  </div>
</body>
</html>
