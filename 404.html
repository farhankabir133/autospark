<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Spark BD - Redirecting...</title>
  <script>
    // Robust SPA redirect for GitHub Pages (custom domain, infinite loop safe)
    (function() {
      var location = window.location;
      var path = location.pathname;
      var search = location.search;
      var hash = location.hash;

      // If path already contains /?/ (anywhere), do not redirect
      if (path.indexOf('/?/') !== -1 || path.endsWith('/index.html')) return;

      // Remove leading slash for clean join
      var cleanPath = path.replace(/^\//, '');

      // Build redirect URL
      var redirectUrl = location.protocol + '//' + location.host + '/?/' + cleanPath;
      if (search) redirectUrl += '&' + search.slice(1);
      if (hash) redirectUrl += hash;

      location.replace(redirectUrl);
    })();
  </script>
</head>
<body>
  <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: system-ui, -apple-system, sans-serif;">
    <div style="text-align: center;">
      <h1 style="color: #3b82f6;">Auto Spark BD</h1>
      <p>Redirecting...</p>
    </div>
  </div>
</body>
</html>
