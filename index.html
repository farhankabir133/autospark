      .hero-placeholder{position:relative;width:100%;height:100vh;background:#0a0a0a;display:flex;align-items:center;justify-content:center}
      /* Skeleton loading animation */
      @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

      /* Reduce CLS: reserve space for lazy images */
      img{content-visibility:auto}
