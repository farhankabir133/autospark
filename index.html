      // Robust fallback: if the hosted widget doesn't respect the `position` config,
      // observe DOM mutations and relocate the widget container to the right side.
      (function(){
        const STARTING_TEXT = 'Hello! How can I help you today?'
        const applyRight = (el) => {
            try{
              // rename behavior: position to left instead of right
              el.style.position = 'fixed'
              el.style.left = '20px'
              el.style.right = 'auto'
              el.style.bottom = el.style.bottom || '24px'
              el.style.zIndex = '2147483647'
              // Ensure pointer events and transform preserve usability

          // or have role=dialog, or data-* attributes commonly used by widgets.
          const all = Array.from(document.body.querySelectorAll('div,aside,section'))

            const txt = (el.innerText || '')
            if (!txt) continue
            if (txt.includes(STARTING_TEXT) || (el.getAttribute && el.getAttribute('role') === 'dialog')) {
              applyRight(el)
              return true
            }
          }
          return false
        }

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
          findAndApply()
        }

              const containsStart = (n.innerText || '').includes(STARTING_TEXT)
              if (containsStart) {
                applyRight(n)
                mo.disconnect()
                return
              }
              // check children quickly
              if (Array.from(n.querySelectorAll && n.querySelectorAll('*') || []).some(ch => (ch.innerText||'').includes(STARTING_TEXT))) {
                applyRight(n)
                mo.disconnect()
                return
              }
            }
          }
        })
        try{ mo.observe(document.body, { childList: true, subtree: true }) }catch(e){}
        // As a final attempt, run a short interval to catch slow widgets
        const iv = setInterval(()=>{ if(findAndApply()) { clearInterval(iv); try{ mo.disconnect() }catch(e){} } }, 500)
        // stop polling after 15s
